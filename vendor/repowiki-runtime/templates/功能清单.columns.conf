# 功能清单列配置，由 L3 skill/LLM 读取并生成清单。
# 事实字段来自 .repowiki/knowledge/functions.json。
# 业务字段来自 L3 生成的 sidecar metadata，不由 repowiki 脚本伪造。
#
# 可用事实字段：
# index, app, method, signature, iface_qn, impl_qn, version, entry,
# module, module_cat, profile, entry_type, http_method, path, route, controller_qn
#
# 可用业务 metadata 字段：
# metadata.business_name, metadata.business_domain, metadata.function_name,
# metadata.summary, metadata.review_required, metadata.confidence

@title = {app} 功能清单
序号 = index
应用名 = app
业务功能名称 = metadata.business_name
业务域 = metadata.business_domain
功能类型 = entry_type
功能名称 = metadata.function_name
功能概述 = metadata.summary
服务接口全限定名 = iface_qn
版本 = version
功能入口 = entry
复核要求 = metadata.review_required
